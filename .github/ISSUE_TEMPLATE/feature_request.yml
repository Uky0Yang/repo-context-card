name: Feature request
description: Suggest a scanner or output improvement
title: "[Feature] "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What repository context is missing or hard to detect?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: What should repo-context-card output?
    validations:
      required: true
  - type: textarea
    id: example
    attributes:
      label: Example
      description: Share a short repository layout or command example.
